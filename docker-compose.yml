services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: banhcuon
      MYSQL_USER: banhcuon
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-banhcuonpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "banhcuon", "-pbanhcuonpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  be:
    build:
      context: .
      dockerfile: be/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_DSN: "banhcuon:${MYSQL_PASSWORD:-banhcuonpass}@tcp(mysql:3306)/banhcuon?parseTime=true&charset=utf8mb4"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-86400}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_URL: ${VNPAY_URL:-}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-}
      ZALOPAY_APP_ID: ${ZALOPAY_APP_ID:-}
      ZALOPAY_KEY1: ${ZALOPAY_KEY1:-}
      ZALOPAY_KEY2: ${ZALOPAY_KEY2:-}
      ZALOPAY_ENDPOINT: ${ZALOPAY_ENDPOINT:-}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - be
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - be
      - fe
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mysql_data:
  redis_data:
  caddy_data:
  caddy_config:
